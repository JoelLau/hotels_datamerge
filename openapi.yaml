openapi: 3.0.4

info:
  title: Hotels API
  description: returns consolidated about hotels based on information from different sources (acme, paperflies, patagonia).
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: default local server

paths:
  /livez:
    get:
      summary: Liveliness Probe
      description: always returns 200 OK
      responses:
        "200":
          description: application is live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                healthy:
                  $ref: "#/components/examples/Healthy"

  /readyz:
    get:
      summary: Readiness Probe
      description: returns 200 OK when the application is ready to accept requests
      responses:
        "200":
          description: application is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                healthy:
                  $ref: "#/components/examples/Healthy"

        "503":
          description: application is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              examples:
                unhealthy:
                  $ref: "#/components/examples/Unhealthy"

  /api/v1/hotels:
    get:
      summary: List Hotels
      description: >
        Returns information about hotels obtained from suppliers (acme, paperflies, patania, etc)
      parameters:
        - name: hotels
          in: query
          description: comma-separated list of hotel ids
          schema:
            type: string
          example: "iJhz,SjyX,f8c9"
        - name: destination
          in: query
          description: destination id
          schema:
            type: string
          example: "5432"
      responses:
        "200":
          description: list of hotels matching the given filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hotel"
              examples:
                sample:
                  $ref: "#/components/examples/Hotels"

        "500":
          description: failed to fetch hotels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                sample:
                  $ref: "#/components/examples/FetchError"

components:
  schemas:
    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        components:
          type: object
          description: per-component health status, present when status is unhealthy
          additionalProperties:
            type: string

    Hotel:
      type: object
      required:
        - id
        - destination_id
        - name
      properties:
        id:
          type: string
          example: "iJhz"
        destination_id:
          type: integer
          example: 5432
        name:
          type: string
          example: "Beach Villas Singapore"
        location:
          $ref: "#/components/schemas/Location"
        description:
          type: string
        amenities:
          $ref: "#/components/schemas/Amenities"
        images:
          $ref: "#/components/schemas/Images"
        booking_conditions:
          type: array
          items:
            type: string

    Location:
      type: object
      properties:
        lat:
          type: number
          format: double
          example: 1.264751
        lng:
          type: number
          format: double
          example: 103.824006
        address:
          type: string
          example: "8 Sentosa Gateway, Beach Villas, 098269"
        city:
          type: string
          example: "Singapore"
        country:
          type: string
          example: "Singapore"

    Amenities:
      type: object
      properties:
        general:
          type: array
          items:
            type: string
        room:
          type: array
          items:
            type: string

    Images:
      type: object
      properties:
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/Image"
        site:
          type: array
          items:
            $ref: "#/components/schemas/Image"
        amenities:
          type: array
          items:
            $ref: "#/components/schemas/Image"

    Image:
      type: object
      properties:
        link:
          type: string
          format: uri
          example: "https://d2ey9sqrvkqdfs.cloudfront.net/0qZF/2.jpg"
        description:
          type: string
          example: "Double room"

    ErrorResponse:
      type: object
      description: loosely based on RFC 9457 problem details 
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri

  examples:
    Hotels:
      value:
        - id: "iJhz"
          destination_id: 5432
          name: "Beach Villas Singapore"
          location:
            lat: 1.264751
            lng: 103.824006
            address: "8 Sentosa Gateway, Beach Villas, 098269"
            city: "Singapore"
            country: "Singapore"
          description: "Surrounded by tropical gardens, these upscale villas in elegant Colonial-style buildings are part of the Resorts World Sentosa complex and a 2-minute walk from the Waterfront train station. Featuring sundecks and pool, garden or sea views, the plush 1- to 3-bedroom villas offer free Wi-Fi and flat-screens, as well as free-standing baths, minibars, and tea and coffeemaking facilities. Upgraded villas add private pools, fridges and microwaves; some have wine cellars. A 4-bedroom unit offers a kitchen and a living room. There's 24-hour room and butler service. Amenities include posh restaurant, plus an outdoor pool, a hot tub, and free parking."
          amenities:
            general:
              - "outdoor pool"
              - "indoor pool"
              - "business center"
              - "childcare"
              - "wifi"
              - "dry cleaning"
              - "breakfast"
            room:
              - "aircon"
              - "tv"
              - "coffee machine"
              - "kettle"
              - "hair dryer"
              - "iron"
              - "bathtub"
          images:
            rooms:
              - link: "https://d2ey9sqrvkqdfs.cloudfront.net/0qZF/2.jpg"
                description: "Double room"
              - link: "https://d2ey9sqrvkqdfs.cloudfront.net/0qZF/3.jpg"
                description: "Double room"
              - link: "https://d2ey9sqrvkqdfs.cloudfront.net/0qZF/4.jpg"
                description: "Bathroom"
            site:
              - link: "https://d2ey9sqrvkqdfs.cloudfront.net/0qZF/1.jpg"
                description: "Front"
            amenities:
              - link: "https://d2ey9sqrvkqdfs.cloudfront.net/0qZF/0.jpg"
                description: "RWS"
          booking_conditions:
            - "All children are welcome. One child under 12 years stays free of charge when using existing beds. One child under 2 years stays free of charge in a child's cot/crib. One child under 4 years stays free of charge when using existing beds. One older child or adult is charged SGD 82.39 per person per night in an extra bed. The maximum number of children's cots/cribs in a room is 1. There is no capacity for extra beds in the room."
            - "Pets are not allowed."
            - "WiFi is available in all areas and is free of charge."
            - "Free private parking is possible on site (reservation is not needed)."
            - "Guests are required to show a photo identification and credit card upon check-in. Please note that all Special Requests are subject to availability and additional charges may apply. Payment before arrival via bank transfer is required. The property will contact you after you book to provide instructions. Please note that the full amount of the reservation is due before arrival. Resorts World Sentosa will send a confirmation with detailed payment information. After full payment is taken, the property's details, including the address and where to collect keys, will be emailed to you. Bag checks will be conducted prior to entry to Adventure Cove Waterpark. === Upon check-in, guests will be provided with complimentary Sentosa Pass (monorail) to enjoy unlimited transportation between Sentosa Island and Harbour Front (VivoCity). === Prepayment for non refundable bookings will be charged by RWS Call Centre. === All guests can enjoy complimentary parking during their stay, limited to one exit from the hotel per day. === Room reservation charges will be charged upon check-in. Credit card provided upon reservation is for guarantee purpose. === For reservations made with inclusive breakfast, please note that breakfast is applicable only for number of adults paid in the room rate. Any children or additional adults are charged separately for breakfast and are to paid directly to the hotel."

    Healthy:
      value:
        status: "healthy"

    Unhealthy:
      value:
        status: "unhealthy"
        components:
          database: "down"
          cache: "up"

    FetchError:
      value:
        title: "failed to fetch hotels"
        status: 500
