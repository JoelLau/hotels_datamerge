version: "2"

linters:
  enable:
    - errorlint
    - revive
    - misspell
    - unconvert
    - unparam
    - paralleltest
    - tparallel
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofumpt
    - goimports
